name: 构建多架构镜像 (ghcr.io)

on:
  push:
    branches: [ main, master ]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:  # 这里必须写全，缺一不可
      contents: read
      packages: write
      attestations: write
      id-token: write
      
    steps:
      - uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送（直接写你自己的名字，没问题）
      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/feiniao025/ddddocr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
